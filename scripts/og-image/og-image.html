<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lynq OG Image</title>
<style>
  /* 1200x630 canvas, captured at 2x device scale -> 2400x1260 PNG.
     Visual language mirrors docs/.vitepress landing hero (HeroDemo.vue) +
     ambient backdrop (LandingPageNew.vue): black bg, teal #4fd1cb accent,
     46px interactive cell grid with a frozen left->right teal sweep. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #000; }
  body {
    position: relative;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #ededed;
  }
  .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }

  /* ── ambient brand glows (pb-glow, frozen mid-pulse) ── */
  .glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(900px 760px at 6% 0%, rgba(51, 172, 168, 0.26), transparent 58%),
      radial-gradient(860px 800px at 100% 36%, rgba(59, 130, 246, 0.17), transparent 56%),
      radial-gradient(940px 780px at 50% 108%, rgba(51, 172, 168, 0.22), transparent 58%);
  }

  /* ── hero cell grid (46px), frozen frame of the g-flow sweep ── */
  .grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(27, 46px);
    grid-auto-rows: 46px;
    -webkit-mask-image: radial-gradient(ellipse 88% 72% at 50% 44%, #000 24%, transparent 84%);
    mask-image: radial-gradient(ellipse 88% 72% at 50% 44%, #000 24%, transparent 84%);
  }
  .grid span {
    border-right: 1px solid rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  /* ── content ── */
  .content {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 0 80px 26px;
  }
  .logo { width: 74px; height: 74px; margin-bottom: 26px; }
  .badge {
    display: inline-flex; align-items: center; gap: 9px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.04);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 15.5px; letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.68);
    margin-bottom: 30px;
  }
  .badge .diamond { color: #4fd1cb; font-size: 13px; }
  h1 {
    font-size: 78px; font-weight: 700;
    line-height: 1.09; letter-spacing: -0.028em;
    margin-bottom: 26px;
  }
  h1 .accent { color: #4fd1cb; }
  .sub {
    font-size: 24.5px; line-height: 1.55;
    color: rgba(255, 255, 255, 0.66);
    max-width: 46ch;
  }
  .site {
    position: absolute; left: 0; right: 0; bottom: 74px; z-index: 10;
    text-align: center;
    font-size: 19px; letter-spacing: 0.04em;
    color: #4fd1cb;
  }

  /* ── faint resource-kind chips (final-CTA backdrop motif) ── */
  .kinds {
    position: absolute; left: 0; right: 0; bottom: 22px; z-index: 5;
    display: flex; justify-content: center; gap: 12px;
    white-space: nowrap;
    opacity: 0.30;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 18%, #000 82%, transparent 100%);
    mask-image: linear-gradient(90deg, transparent 0%, #000 18%, #000 82%, transparent 100%);
  }
  .kinds code {
    border: 1px solid rgba(255, 255, 255, 0.09);
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 13px;
    color: #4fd1cb;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid" id="grid"></div>

  <div class="content">
    <img class="logo" src="../../docs/public/logo.png" alt="" />
    <div class="badge mono"><span class="diamond">&#9670;</span>Infrastructure as Data</div>
    <h1>Your Database.<br /><span class="accent">Your Infrastructure.</span></h1>
    <p class="sub">Lynq turns database records into Kubernetes resources. Automatically.</p>
  </div>

  <div class="site mono">lynq.sh</div>

  <div class="kinds mono" aria-hidden="true">
    <code>Deployment</code><code>Service</code><code>Ingress</code><code>ConfigMap</code><code>Secret</code><code>StatefulSet</code><code>CronJob</code><code>HorizontalPodAutoscaler</code><code>NetworkPolicy</code>
  </div>

<script>
  // Freeze one frame of the hero's g-flow sweep: a teal band of lit cells
  // (leading edge bright, trailing fade) plus a few scattered pre-lit cells.
  // Deterministic PRNG so every render produces the identical image.
  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const rand = mulberry32(20260706);
  const COLS = 27, ROWS = 14;
  const grid = document.getElementById('grid');

  // Sweep band intensity per column: sharp leading edge at col 8, longer tail
  // behind it (cols 3-8). A faint echo of the previous cycle sits near col 21.
  function bandIntensity(c) {
    let v = 0;
    if (c <= 8 && c >= 3) v = Math.max(v, 1 - (8 - c) / 5.5);
    if (c <= 21 && c >= 18) v = Math.max(v, 0.35 * (1 - (21 - c) / 3.5));
    return v;
  }

  const scattered = new Set();
  while (scattered.size < 14) {
    scattered.add(Math.floor(rand() * COLS * ROWS));
  }

  for (let i = 0; i < COLS * ROWS; i++) {
    const c = i % COLS;
    const cell = document.createElement('span');
    let alpha = bandIntensity(c) * 0.26 * (0.65 + 0.55 * rand());
    if (scattered.has(i)) alpha = Math.max(alpha, 0.05 + 0.11 * rand());
    if (alpha > 0.015) cell.style.background = 'rgba(79, 209, 203, ' + alpha.toFixed(3) + ')';
    grid.appendChild(cell);
  }
</script>
</body>
</html>
