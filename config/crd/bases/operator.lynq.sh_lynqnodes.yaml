                type: integer
              lastFullReconcileAt:
                description: |-
                  LastFullReconcileAt is the baseline timestamp used to schedule the next
                  periodic force-reapply (drift-correction resync). The LynqNode controller
                  compares `time.Since(LastFullReconcileAt)` against `ForceReapplyInterval`
                  (default 10 minutes) and, when the interval has elapsed, bypasses the
                  apply-skip check and re-applies every child resource unconditionally.
                  External edits that preserve the lynq.sh/applied-hash annotation on a
                  child resource will not be caught by the annotation-only skip path; the
                  next force-reapply cycle corrects them.

                  A nil value means the controller has not yet established a baseline for
                  this LynqNode (brand-new node, or freshly restarted controller observing
                  the node for the first time). The controller treats nil as "stamp `now`
