                  - id
                  - kind
                  - phase
                  type: object
                type: array
              skippedResourceIds:
                description: SkippedResourceIds lists the IDs of resources that were
                  skipped due to dependency failures
                items:
                  type: string
                type: array
              skippedResources:
                description: SkippedResources is the number of resources skipped due
                  to dependency failures
                format: int32
                type: integer
            type: object
